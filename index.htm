<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ Life Dashboard</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['attribute', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            lpink: '#ffb3d1',
            lcyan: '#a5f3fc',
            dpink: '#f472b6',
            dcyan: '#22d3ee',
            cream: '#fffdf7',
            kraft: '#f5efe0',
          },
          fontFamily: {
            hand:  ['Caveat', 'cursive'],
            sans:  ['Inter', 'system-ui', 'sans-serif'],
            mono:  ['JetBrains Mono', 'monospace'],
          },
          rotate: {
            '1':  '1deg',
            '2':  '2deg',
            '3':  '3deg',
            '-1': '-1deg',
            '-2': '-2deg',
            '-3': '-3deg',
          },
          keyframes: {
            wobble:    { '0%,100%': { transform: 'rotate(-1.5deg)' }, '50%': { transform: 'rotate(1.5deg)' } },
            popIn:     { '0%': { opacity:'0', transform:'scale(0.85) rotate(-3deg)' }, '70%': { transform:'scale(1.04) rotate(1deg)' }, '100%': { opacity:'1', transform:'scale(1) rotate(0deg)' } },
            slideUp:   { '0%': { opacity:'0', transform:'translateY(16px) scale(0.96)' }, '100%': { opacity:'1', transform:'translateY(0) scale(1)' } },
            pulseSoft: { '0%,100%': { opacity:'1' }, '50%': { opacity:'0.65' } },
            wiggle:    { '0%,100%': { transform:'rotate(-2deg)' }, '50%': { transform:'rotate(2deg)' } },
            stampIn:   { '0%': { opacity:'0', transform:'scale(1.4) rotate(8deg)' }, '60%': { transform:'scale(0.95) rotate(-2deg)' }, '100%': { opacity:'1', transform:'scale(1) rotate(0deg)' } },
            tickBounce:{ '0%': { transform:'scale(1)' }, '40%': { transform:'scale(1.08) translateY(-3px)' }, '100%': { transform:'scale(1)' } },
            float:     { '0%,100%': { transform:'translateY(0px)' }, '50%': { transform:'translateY(-6px)' } },
          },
          animation: {
            'wobble':     'wobble 3s ease-in-out infinite',
            'pop-in':     'popIn 0.5s cubic-bezier(.22,1,.36,1) both',
            'slide-up':   'slideUp 0.4s cubic-bezier(.22,1,.36,1) both',
            'pulse-soft': 'pulseSoft 2.5s ease-in-out infinite',
            'wiggle':     'wiggle 0.4s ease-in-out',
            'stamp-in':   'stampIn 0.45s cubic-bezier(.22,1,.36,1) both',
            'tick-bounce':'tickBounce 0.25s ease both',
            'float':      'float 3s ease-in-out infinite',
          },
        }
      }
    }
  </script>

  <!-- Google Fonts: Caveat (handwritten) + Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<!-- ─── body: scrapbook kraft-paper background ───────────────────────────── -->
<body class="min-h-screen font-sans overflow-x-hidden scrapbook-bg" data-theme="light">

  <!-- Particle canvas -->
  <canvas id="particle-canvas" class="fixed inset-0 w-full h-full pointer-events-none" style="z-index:0"></canvas>

  <!-- Scattered doodle dots (decorative, aria-hidden) -->
  <div aria-hidden="true" class="fixed inset-0 pointer-events-none overflow-hidden" style="z-index:0">
    <span class="doodle-dot" style="top:8%;  left:5%;  background:#ffb3d1; width:18px; height:18px; animation-delay:0s"></span>
    <span class="doodle-dot" style="top:15%; left:88%; background:#a5f3fc; width:12px; height:12px; animation-delay:0.6s"></span>
    <span class="doodle-dot" style="top:40%; left:3%;  background:#a5f3fc; width:22px; height:22px; animation-delay:1.2s"></span>
    <span class="doodle-dot" style="top:60%; left:92%; background:#ffb3d1; width:14px; height:14px; animation-delay:0.3s"></span>
    <span class="doodle-dot" style="top:80%; left:7%;  background:#ffb3d1; width:10px; height:10px; animation-delay:0.9s"></span>
    <span class="doodle-dot" style="top:88%; left:85%; background:#a5f3fc; width:20px; height:20px; animation-delay:1.5s"></span>
    <span class="doodle-star" style="top:25%; left:94%">⭐</span>
    <span class="doodle-star" style="top:70%; left:2%">🌸</span>
    <span class="doodle-star" style="top:50%; left:96%">💫</span>
  </div>

  <!-- Page content -->
  <div class="relative" style="z-index:1">

    <!-- Storage warning -->
    <div id="storage-warning" role="alert" aria-live="polite" hidden
         class="flex items-center justify-center gap-2 px-4 py-2.5
                bg-amber-50 border-b-2 border-amber-300 text-amber-700
                text-sm font-medium">
      <span>⚠️</span>
      <p class="m-0">Local storage is unavailable. Your data will not be saved.</p>
    </div>

    <!-- ─── Header ─────────────────────────────────────────────────────────── -->
    <header class="scrapbook-header sticky top-0 z-50
                   flex items-center justify-between
                   px-6 py-4
                   dark:bg-gray-900/90 dark:border-gray-700">

      <!-- Brand — handwritten style -->
      <div class="flex items-center gap-2 select-none">
        <span class="text-2xl animate-float" style="display:inline-block">📌</span>
        <span class="font-hand text-2xl font-bold text-dpink dark:text-lpink tracking-wide">
          My Life Dashboard
        </span>
      </div>

      <!-- Theme toggle — sticker style -->
      <button id="theme-toggle" type="button"
              aria-label="Switch to dark mode" aria-pressed="false"
              class="sticker-btn sticker-btn-pink group">
        <span id="theme-icon" aria-hidden="true"
              class="text-lg transition-transform duration-300 group-hover:rotate-12 group-hover:scale-125">🌙</span>
        <span id="theme-label" class="hidden sm:inline font-hand text-base">Dark mode</span>
      </button>
    </header>

    <!-- ─── Dashboard grid ─────────────────────────────────────────────────── -->
    <main class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4 py-8 md:px-10 md:py-10
                 max-w-5xl mx-auto w-full">
      <h1 class="sr-only">Life Dashboard</h1>

      <!-- ── Clock & Greeting ─────────────────────────────────────────────── -->
      <section id="clock-widget"
               aria-label="Clock and Greeting"
               class="scrap-card scrap-card-pink animate-pop-in text-center"
               style="--card-rotate: -1.5deg; animation-delay: 0ms">

        <!-- Washi tape top -->
        <div class="washi-tape washi-tape-pink" aria-hidden="true"></div>
        <!-- Pushpin -->
        <div class="pushpin pushpin-pink" aria-hidden="true">📍</div>

        <h2 class="font-hand text-2xl font-bold text-dpink dark:text-lpink mb-1 mt-2">
          🕐 Clock
        </h2>

        <!-- Greeting -->
        <div id="greeting-text" aria-live="polite"
             class="font-hand text-2xl font-bold text-dpink dark:text-lpink
                    animate-pulse-soft tracking-wide my-1">
        </div>

        <!-- Name row -->
        <div id="name-row" class="flex items-center justify-center gap-2 flex-wrap min-h-[2.5rem] my-1">
          <span id="name-display" class="font-hand text-base text-gray-500 italic dark:text-gray-400"></span>
          <button id="name-edit-btn" type="button" aria-label="Edit your name"
                  class="sticker-btn sticker-btn-cyan text-sm py-0.5 px-3">
            ✏️ Edit name
          </button>
          <form id="name-form" hidden novalidate
                class="flex items-center gap-1.5 flex-wrap justify-center mt-1">
            <label for="name-input" class="sr-only">Your name</label>
            <input id="name-input" type="text" placeholder="Your name…"
                   autocomplete="off" maxlength="40"
                   class="input-field w-36 text-sm py-1" />
            <button type="submit" aria-label="Save name" class="sticker-btn sticker-btn-pink text-sm py-1 px-3">Save</button>
            <button type="button" id="name-cancel-btn" aria-label="Cancel name edit"
                    class="sticker-btn sticker-btn-ghost text-sm py-1 px-3">Cancel</button>
          </form>
        </div>

        <!-- Polaroid clock display -->
        <div class="polaroid-clock mx-auto my-2">
          <time id="clock-time" aria-live="polite"
                class="block font-mono text-4xl md:text-5xl font-bold text-dpink dark:text-lcyan
                       leading-none tracking-tight">
          </time>
          <div id="clock-date" aria-live="polite"
               class="font-hand text-base text-gray-500 dark:text-gray-400 mt-2">
          </div>
        </div>
      </section>

      <!-- ── Focus Timer ───────────────────────────────────────────────────── -->
      <section id="timer-widget"
               aria-label="Focus Timer"
               class="scrap-card scrap-card-cyan animate-pop-in text-center"
               style="--card-rotate: 1.2deg; animation-delay: 80ms">

        <div class="washi-tape washi-tape-cyan" aria-hidden="true"></div>
        <div class="pushpin pushpin-cyan" aria-hidden="true">📌</div>

        <h2 class="font-hand text-2xl font-bold text-dcyan dark:text-lcyan mb-1 mt-2">
          ⏱️ Focus Timer
        </h2>

        <div class="flex flex-col items-center gap-4 py-2">
          <!-- Glow ring (separate from display — no bg conflict) -->
          <div class="relative flex items-center justify-center">
            <div class="absolute w-52 h-24 rounded-full bg-lcyan/25 dark:bg-lcyan/10
                        blur-xl pointer-events-none animate-pulse-soft"></div>
            <div id="timer-display"
                 aria-live="polite" aria-atomic="true"
                 class="timer-display-box">
              25:00
            </div>
          </div>

          <!-- Controls -->
          <div class="flex justify-center gap-3 flex-wrap">
            <button id="timer-start" type="button" aria-label="Start focus timer"
                    class="sticker-btn sticker-btn-pink">▶ Start</button>
            <button id="timer-stop" type="button" disabled aria-label="Stop focus timer"
                    class="sticker-btn sticker-btn-cyan">⏸ Stop</button>
            <button id="timer-reset" type="button" aria-label="Reset focus timer"
                    class="sticker-btn sticker-btn-ghost">↺ Reset</button>
          </div>
        </div>
      </section>

      <!-- ── To-Do List ────────────────────────────────────────────────────── -->
      <section id="todo-widget"
               aria-label="To-Do List"
               class="scrap-card scrap-card-pink animate-pop-in"
               style="--card-rotate: -0.8deg; animation-delay: 160ms">

        <div class="washi-tape washi-tape-stripe" aria-hidden="true"></div>
        <div class="pushpin pushpin-pink" aria-hidden="true">📍</div>

        <h2 class="font-hand text-2xl font-bold text-dpink dark:text-lpink mb-1 mt-2">
          ✅ To-Do List
        </h2>

        <!-- Add form -->
        <form id="todo-form" novalidate class="flex gap-2">
          <label for="todo-input" class="sr-only">New task description</label>
          <input id="todo-input" type="text" placeholder="Add a new task…"
                 autocomplete="off" aria-describedby="todo-error"
                 class="input-field flex-1" />
          <button type="submit" aria-label="Add new task"
                  class="sticker-btn sticker-btn-pink shrink-0">+ Add</button>
        </form>

        <p id="todo-error" role="alert" aria-live="assertive"
           class="font-hand text-base text-dpink dark:text-lpink min-h-[1.25rem] -mt-1 px-1"></p>

        <!-- Sort row -->
        <div id="todo-sort-row" aria-label="Sort tasks" class="flex items-center gap-2">
          <label for="todo-sort" class="font-hand text-base text-gray-500 dark:text-gray-400 whitespace-nowrap">
            Sort:
          </label>
          <select id="todo-sort" aria-label="Sort tasks by"
                  class="input-field text-sm py-1 flex-1 max-w-[160px] cursor-pointer font-hand">
            <option value="added">Date added</option>
            <option value="alpha">A → Z</option>
            <option value="status">Incomplete first</option>
          </select>
        </div>

        <!-- Task list — ruled paper background -->
        <ul id="todo-list" aria-label="Task list"
            class="ruled-list flex flex-col gap-0 max-h-72 overflow-y-auto pr-1 todo-scroll">
        </ul>
      </section>

      <!-- ── Quick Links ───────────────────────────────────────────────────── -->
      <section id="links-widget"
               aria-label="Quick Links"
               class="scrap-card scrap-card-cyan animate-pop-in"
               style="--card-rotate: 1.8deg; animation-delay: 240ms">

        <div class="washi-tape washi-tape-cyan" aria-hidden="true"></div>
        <div class="pushpin pushpin-cyan" aria-hidden="true">📌</div>

        <h2 class="font-hand text-2xl font-bold text-dcyan dark:text-lcyan mb-1 mt-2">
          🔗 Quick Links
        </h2>

        <!-- Add form -->
        <form id="links-form" novalidate class="flex gap-2 flex-wrap">
          <label for="links-label-input" class="sr-only">Link label</label>
          <input id="links-label-input" type="text" placeholder="Label"
                 autocomplete="off" aria-describedby="links-error"
                 class="input-field flex-1 min-w-[80px]" />
          <label for="links-url-input" class="sr-only">Link URL</label>
          <input id="links-url-input" type="url" placeholder="https://example.com"
                 autocomplete="off" aria-describedby="links-error"
                 class="input-field flex-[2] min-w-[140px]" />
          <button type="submit" aria-label="Add new link"
                  class="sticker-btn sticker-btn-cyan shrink-0">+ Add</button>
        </form>

        <p id="links-error" role="alert" aria-live="assertive"
           class="font-hand text-base text-dpink dark:text-lpink min-h-[1.25rem] -mt-1 px-1"></p>

        <div id="links-container" aria-label="Saved links"
             class="flex flex-wrap gap-2 min-h-[2.5rem]">
        </div>
      </section>

    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
