<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Storage warning banner (hidden by default) -->
  <div id="storage-warning" role="alert" aria-live="polite" hidden>
    <p>⚠️ Local storage is unavailable. Your data will not be saved between sessions.</p>
  </div>

  <main>
    <h1 class="visually-hidden">Life Dashboard</h1>

    <!-- Clock & Greeting Widget -->
    <section id="clock-widget" aria-label="Clock and Greeting">
      <h2 class="widget-title">Clock</h2>
      <div id="greeting-text" aria-live="polite"></div>
      <time id="clock-time" aria-live="polite"></time>
      <div id="clock-date" aria-live="polite"></div>
    </section>

    <!-- Focus Timer Widget -->
    <section id="timer-widget" aria-label="Focus Timer">
      <h2 class="widget-title">Focus Timer</h2>
      <div id="timer-display" aria-live="polite" aria-atomic="true">25:00</div>
      <div class="timer-controls">
        <button id="timer-start" type="button" aria-label="Start focus timer">Start</button>
        <button id="timer-stop" type="button" disabled aria-label="Stop focus timer">Stop</button>
        <button id="timer-reset" type="button" aria-label="Reset focus timer">Reset</button>
      </div>
    </section>

    <!-- To-Do List Widget -->
    <section id="todo-widget" aria-label="To-Do List">
      <h2 class="widget-title">To-Do List</h2>
      <form id="todo-form" novalidate>
        <label for="todo-input" class="visually-hidden">New task description</label>
        <input
          id="todo-input"
          type="text"
          placeholder="Add a new task…"
          autocomplete="off"
          aria-describedby="todo-error"
        />
        <button type="submit" aria-label="Add new task">Add</button>
      </form>
      <p id="todo-error" role="alert" aria-live="assertive"></p>
      <ul id="todo-list" aria-label="Task list"></ul>
    </section>

    <!-- Quick Links Widget -->
    <section id="links-widget" aria-label="Quick Links">
      <h2 class="widget-title">Quick Links</h2>
      <form id="links-form" novalidate>
        <label for="links-label-input" class="visually-hidden">Link label</label>
        <input
          id="links-label-input"
          type="text"
          placeholder="Label"
          autocomplete="off"
          aria-describedby="links-error"
        />
        <label for="links-url-input" class="visually-hidden">Link URL</label>
        <input
          id="links-url-input"
          type="url"
          placeholder="https://example.com"
          autocomplete="off"
          aria-describedby="links-error"
        />
        <button type="submit" aria-label="Add new link">Add</button>
      </form>
      <p id="links-error" role="alert" aria-live="assertive"></p>
      <div id="links-container" aria-label="Saved links"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
